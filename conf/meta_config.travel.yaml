metrics:
- name: 订单量
  description: 订单总数（订单表行数计数）
  relevant_columns:
  - orders.id
  alias:
  - 订单数
  - 下单量
  - order_count
- name: 收入金额
  description: 订单实付金额合计（orders.paid_amount 求和）
  relevant_columns:
  - orders.paid_amount
  alias:
  - GMV
  - 营收
  - 销售额
  - 成交金额
- name: 退款金额
  description: 退款打款金额合计（refund_records.amount 求和）
  relevant_columns:
  - refund_records.amount
  alias:
  - 退款额
  - 退款总额
- name: 优惠金额
  description: 券核销 + 促销减免合计
  relevant_columns:
  - order_coupon_usages.discount_amount
  - order_promotion_details.discount_amount
  alias:
  - 优惠抵扣
  - 优惠总额
- name: 转化率
  description: 已支付订单数 / 创建订单数（基于 orders.status_code 统计）
  relevant_columns:
  - orders.status_code
  - orders.id
  alias:
  - 支付转化
  - 支付转化率
- name: 退款率
  description: 发生退款的订单数 / 订单总数
  relevant_columns:
  - refund_requests.id
  - orders.id
  alias:
  - 退款比例
- name: 客单价
  description: 收入金额 / 订单量
  relevant_columns:
  - orders.paid_amount
  - orders.id
  alias:
  - AOV
  - 平均订单金额
