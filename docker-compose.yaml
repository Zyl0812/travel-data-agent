name: data-agent-travel

services:
  mysql:
    image: mysql:8.0
    container_name: data-agent-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_USER: zyl
      MYSQL_PASSWORD: 123456
      MYSQL_DATABASE: meta
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data-agent-net

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: data-agent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # HTTP / Web UI: http://localhost:6333/dashboard
      - "6334:6334" # gRPC
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data-agent-net

  elasticsearch:
    build:
      context: ./docker/elasticsearch
      dockerfile: Dockerfile
    image: data-agent-es:8.13.4-ik
    container_name: data-agent-es
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      ingest.geoip.downloader.enabled: "false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - data-agent-net

volumes:
  mysql-data:
  qdrant-data:
  es-data:

networks:
  data-agent-net:
    driver: bridge
